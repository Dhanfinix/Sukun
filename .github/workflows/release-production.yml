name: Production Release

on:
  push:
    branches:
      - 'main'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Publish to Production
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/sukun.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build Release AAB
        env:
          STORE_FILE: sukun.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew bundleRelease

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab-production
          path: app/build/outputs/bundle/release/*.aab
          retention-days: 14

      - name: Extract Version Name
        id: version
        run: |
          VERSION_NAME=$(grep -oE 'versionName\s*=\s*"[^"]+"' app/build.gradle.kts | cut -d'"' -f2)
          echo "VERSION_NAME=v$VERSION_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION_NAME }}
          name: Release ${{ env.VERSION_NAME }}
          files: app/build/outputs/bundle/release/*.aab
          generate_release_notes: true

      - name: Upload to Play Store (Production)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: dhanfinix.android.sukun
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: production
          status: completed
          whatsNewDirectory: whatsnew
